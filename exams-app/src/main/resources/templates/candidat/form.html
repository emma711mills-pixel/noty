<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${candidat.idCandidat == null} ? 'Nouveau Candidat' : 'Modifier Candidat'">Candidat</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #2c3e50; }
        label { display: block; margin-top: 12px; font-weight: bold; }
        input[type=text] { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; }
        button { margin-top: 16px; padding: 10px 24px; background: #2980b9; color: white; border: none; cursor: pointer; font-size: 1em; border-radius: 4px; }
        button:hover { background: #1a6fa0; }
        a.btn { display: inline-block; margin-top: 12px; padding: 8px 16px; background: #7f8c8d; color: white; text-decoration: none; border-radius: 4px; }
    </style>
</head>
<body>
    <h1 th:text="${candidat.idCandidat == null} ? 'Nouveau Candidat' : 'Modifier Candidat'">Candidat</h1>

    <form th:action="${candidat.idCandidat == null} ? @{/candidats/nouveau} : @{/candidats/modifier/{id}(id=${candidat.idCandidat})}"
          th:object="${candidat}" method="post">
        <label for="nomCandidat">Nom du candidat :</label>
        <input type="text" id="nomCandidat" th:field="*{nomCandidat}" required placeholder="Entrez le nom"/>

        <button type="submit">Enregistrer</button>
    </form>

    <a class="btn" th:href="@{/candidats}">← Retour à la liste</a>
</body>
</html>
