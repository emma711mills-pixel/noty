<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8"/>
    <title>Candidats</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background: #2980b9; color: white; }
        tr:nth-child(even) { background: #f2f2f2; }
        a.btn { display: inline-block; padding: 6px 14px; background: #2980b9; color: white; text-decoration: none; border-radius: 4px; margin-right: 4px; }
        a.btn-danger { background: #e74c3c; }
        a.btn-success { background: #27ae60; }
        .nav { margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="nav">
        <a class="btn" th:href="@{/}">Accueil</a>
        <a class="btn" th:href="@{/correcteurs}">Correcteurs</a>
    </div>
    <h1>Liste des Candidats</h1>
    <a class="btn btn-success" th:href="@{/candidats/nouveau}">+ Nouveau candidat</a>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nom</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="c : ${candidats}">
                <td th:text="${c.idCandidat}"></td>
                <td th:text="${c.nomCandidat}"></td>
                <td>
                    <a class="btn" th:href="@{/candidats/modifier/{id}(id=${c.idCandidat})}">Modifier</a>
                    <a class="btn btn-danger" th:href="@{/candidats/supprimer/{id}(id=${c.idCandidat})}"
                       onclick="return confirm('Supprimer ce candidat ?')">Supprimer</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(candidats)}">
                <td colspan="3" style="text-align:center; color:#888;">Aucun candidat trouvé.</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
