<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${detailDevis.id != null ? 'Modifier Détail Devis' : 'Nouveau Détail Devis'}">Détail Devis - Gestion Forage</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f5f7fa; }
        .navbar { background: #2d3a4f; color: #fff; padding: 12px 20px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; flex-wrap: wrap; gap: 8px; }
        .navbar strong { margin-right: 20px; font-size: 1.2em; }
        .navbar a { color: #fff; text-decoration: none; padding: 8px 12px; border-radius: 4px; transition: background 0.2s; }
        .navbar a:hover { background: #40506b; }
        .container { max-width: 600px; margin: 20px auto; padding: 0 16px; }
        
        .card { background: #fff; border: 1px solid #dde3ea; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .card h2 { margin-top: 0; color: #2d3a4f; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 1em; }
        
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 1em; }
        .btn-primary { background: #3498db; color: #fff; }
        .btn-primary:hover { background: #2980b9; }
        .btn-secondary { background: #95a5a6; color: #fff; }
        .btn-secondary:hover { background: #7f8c8d; }
        
        .actions { display: flex; gap: 10px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="navbar">
        <strong>Gestion Forage</strong>
        <a href="/clients">Clients</a>
        <a href="/communes">Communes</a>
        <a href="/districts">Districts</a>
        <a href="/regions">Régions</a>
        <a href="/demandes">Demandes</a>
        <a href="/devis">Devis</a>
        <a href="/paiements">Paiements</a>
        <a href="/statuts">Statuts</a>
        <a href="/typeDevis">Types Devis</a>
        <a href="/detailDevis">Détails Devis</a>
    </div>

    <div class="container">
        <div class="card">
            <h2 th:text="${detailDevis.id != null ? 'Modifier Détail Devis' : 'Nouveau Détail Devis'}">Détail Devis</h2>
            
            <form th:action="${action}" method="post">
                <input type="hidden" name="id" th:value="${detailDevis.id}" />
                
                <div class="form-group">
                    <label for="idDevis">Devis:</label>
                    <select id="idDevis" name="idDevis" required>
                        <option value="">-- Choisir un devis --</option>
                        <option th:each="d : ${devisList}" 
                                th:value="${d.id}" 
                                th:text="${'Devis #' + d.id}"
                                th:selected="${selectedDevis != null && selectedDevis == d.id}">
                        </option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="designation">Désignation:</label>
                    <input type="text" id="designation" name="designation" th:value="${detailDevis.designation}" required />
                </div>
                
                <div class="form-group">
                    <label for="quantite">Quantité:</label>
                    <input type="number" id="quantite" name="quantite" th:value="${detailDevis.quantite}" />
                </div>
                
                <div class="form-group">
                    <label for="prixUnitaire">Prix Unitaire (Ar):</label>
                    <input type="number" id="prixUnitaire" name="prixUnitaire" th:value="${detailDevis.prixUnitaire}" step="0.01" />
                </div>
                
                <div class="actions">
                    <button type="submit" class="btn btn-primary" th:text="${detailDevis.id != null ? 'Mettre à jour' : 'Créer'}">Enregistrer</button>
                    <a href="/detailDevis" class="btn btn-secondary">Annuler</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
