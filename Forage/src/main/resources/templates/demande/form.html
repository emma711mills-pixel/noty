<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${demande.id != null ? 'Modifier Demande' : 'Nouvelle Demande'}">Demande - Gestion Forage</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f5f7fa; }
        .navbar { background: #2d3a4f; color: #fff; padding: 12px 20px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; flex-wrap: wrap; gap: 8px; }
        .navbar strong { margin-right: 20px; font-size: 1.2em; }
        .navbar a { color: #fff; text-decoration: none; padding: 8px 12px; border-radius: 4px; transition: background 0.2s; }
        .navbar a:hover { background: #40506b; }
        .container { max-width: 800px; margin: 20px auto; padding: 0 16px; }
        
        .card { background: #fff; border: 1px solid #dde3ea; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .card h2 { margin-top: 0; color: #2d3a4f; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 1em; }
        
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 1em; }
        .btn-primary { background: #3498db; color: #fff; }
        .btn-primary:hover { background: #2980b9; }
        .btn-secondary { background: #95a5a6; color: #fff; }
        .btn-secondary:hover { background: #7f8c8d; }
        
        .actions { display: flex; gap: 10px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="navbar">
        <strong>Gestion Forage</strong>
        <a href="/clients">Clients</a>
        <a href="/communes">Communes</a>
        <a href="/districts">Districts</a>
        <a href="/regions">Régions</a>
        <a href="/demandes">Demandes</a>
        <a href="/devis">Devis</a>
        <a href="/paiements">Paiements</a>
        <a href="/statuts">Statuts</a>
        <a href="/typeDevis">Types Devis</a>
        <a href="/detailDevis">Détails Devis</a>
    </div>

    <div class="container">
        <div class="card">
            <h2 th:text="${demande.id != null ? 'Modifier Demande' : 'Nouvelle Demande'}">Demande</h2>
            
            <form th:action="${action}" method="post">
                <input type="hidden" name="id" th:value="${demande.id}" />
                
                <div class="form-group">
                    <label for="idClient">Client:</label>
                    <select id="idClient" name="idClient" required>
                        <option value="">-- Choisir un client --</option>
                        <option th:each="c : ${clients}" 
                                th:value="${c.id}" 
                                th:text="${c.nom}"
                                th:selected="${selectedClient != null && selectedClient == c.id}">
                        </option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="idRegion">Région:</label>
                    <select id="idRegion" name="idRegion" required>
                        <option value="">-- Choisir une région --</option>
                        <option th:each="r : ${regions}" 
                                th:value="${r.id}" 
                                th:text="${r.nom}"
                                th:selected="${selectedRegion != null && selectedRegion == r.id}">
                        </option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="idDistrict">District:</label>
                    <select id="idDistrict" name="idDistrict" required>
                        <option value="">-- Choisir un district --</option>
                        <option th:each="d : ${districts}" 
                                th:value="${d.id}" 
                                th:text="${d.nom}"
                                th:selected="${selectedDistrict != null && selectedDistrict == d.id}">
                        </option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="idCommune">Commune:</label>
                    <select id="idCommune" name="idCommune" required>
                        <option value="">-- Choisir une commune --</option>
                        <option th:each="c : ${communes}" 
                                th:value="${c.id}" 
                                th:text="${c.nom}"
                                th:selected="${selectedCommune != null && selectedCommune == c.id}">
                        </option>
                    </select>
                </div>
                
                <div class="actions">
                    <button type="submit" class="btn btn-primary" th:text="${demande.id != null ? 'Mettre à jour' : 'Créer'}">Enregistrer</button>
                    <a href="/demandes" class="btn btn-secondary">Annuler</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
